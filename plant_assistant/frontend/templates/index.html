<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物管家 - 智能养护控制面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #0f1922; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* 顶部栏 */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; background: #1a2d3d; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; color: #4caf50; }
        .header .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .header .status-dot.on { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .header .status-dot.off { background: #f44336; }
        .connect-section { display: flex; gap: 10px; align-items: center; }
        .connect-section select, .connect-section button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .connect-section select { background: #243447; color: #e0e0e0; }
        .connect-section button { background: #4caf50; color: white; font-weight: bold; }
        .connect-section button:hover { background: #45a049; }
        .connect-section button.danger { background: #f44336; }
        .connect-section button.danger:hover { background: #d32f2f; }

        /* 仪表盘 */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }

        .card { background: #1a2d3d; border-radius: 12px; padding: 20px; }
        .card h3 { font-size: 16px; color: #8899aa; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .card .plant-name { font-size: 28px; font-weight: bold; color: #4caf50; margin-bottom: 10px; }

        /* 传感器值 */
        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sensor-item { text-align: center; padding: 12px; background: #243447; border-radius: 8px; }
        .sensor-item .value { font-size: 28px; font-weight: bold; color: #fff; }
        .sensor-item .unit { font-size: 14px; color: #8899aa; }
        .sensor-item .label { font-size: 12px; color: #8899aa; margin-top: 4px; }
        .sensor-item .sub { font-size: 11px; color: #ff9800; margin-top: 2px; }

        /* 评分条 */
        .score-bar { margin-bottom: 12px; }
        .score-bar .label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .score-bar .bar-track { height: 8px; background: #243447; border-radius: 4px; overflow: hidden; }
        .score-bar .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .bar-fill.green { background: #4caf50; }
        .bar-fill.yellow { background: #ff9800; }
        .bar-fill.red { background: #f44336; }

        /* 总评大圆 */
        .total-score { text-align: center; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid #4caf50; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
        .score-circle .num { font-size: 40px; font-weight: bold; }

        /* 执行器控制 */
        .actuator-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #243447; border-radius: 8px; margin-bottom: 10px; }
        .actuator-item .name { font-weight: bold; }
        .actuator-item .mode-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
        .mode-tag.auto { background: #4caf50; color: #fff; }
        .mode-tag.manual { background: #ff9800; color: #fff; }

        .actuator-slider { flex: 1; margin: 0 15px; }
        .actuator-slider input[type=range] { width: 100%; }

        .btn-group { display: flex; gap: 6px; }
        .btn-group button { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; color: white; }
        .btn-group .btn-auto { background: #4caf50; }
        .btn-group .btn-open { background: #2196f3; }
        .btn-group .btn-close { background: #f44336; }
        .btn-group .btn-plant { background: #9c27b0; }

        /* 植物切换 */
        .plant-buttons { display: flex; gap: 10px; }
        .plant-buttons button { flex: 1; padding: 10px; border: 2px solid #4caf50; background: transparent; color: #4caf50; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .plant-buttons button:hover, .plant-buttons button.active { background: #4caf50; color: #fff; }

        /* 状态指示 */
        .indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .indicator.green { background: #4caf50; }
        .indicator.gray { background: #555; }

        /* 命令测试 */
        .cmd-section { margin-top: 15px; }
        .cmd-section textarea { width: 100%; height: 60px; background: #243447; border: 1px solid #3a5068; color: #e0e0e0; border-radius: 6px; padding: 8px; font-family: 'Consolas', monospace; font-size: 13px; resize: none; }
        .cmd-section button { margin-top: 8px; padding: 8px 20px; background: #4caf50; border: none; border-radius: 6px; color: #fff; cursor: pointer; }
        .cmd-output { margin-top: 8px; padding: 8px; background: #111; border-radius: 6px; font-family: 'Consolas', monospace; font-size: 12px; color: #4caf50; max-height: 150px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部栏 -->
        <div class="header">
            <h1>植物管家 - 智能养护控制面板</h1>
            <div class="connect-section">
                <span class="status-dot" id="statusDot" class="off"></span>
                <span id="connectLabel">未连接</span>
                <select id="portSelect">
                    <option value="">自动检测</option>
                </select>
                <button id="btnConnect" onclick="toggleConnect()">连接</button>
                <button class="danger" onclick="refreshPorts()">刷新</button>
            </div>
        </div>

        <!-- 仪表盘 -->
        <div class="dashboard">
            <!-- 植物信息 + 总评分 -->
            <div class="card">
                <h3>当前植物</h3>
                <div class="plant-name" id="plantName">---</div>
                <div class="total-score">
                    <div class="score-circle" id="scoreCircle" style="border-color:#4caf50">
                        <span class="num" id="totalScore">--</span>
                    </div>
                    <p style="font-size:12px;color:#8899aa">综合评分 / 100</p>
                </div>
            </div>

            <!-- 传感器数据 -->
            <div class="card">
                <h3>环境传感器</h3>
                <div class="sensor-grid">
                    <div class="sensor-item">
                        <div class="value" id="tempVal">--</div>
                        <div class="unit">°C</div>
                        <div class="label">温度</div>
                        <div class="sub" id="tempScore" style="color:#4caf50">--</div>
                    </div>
                    <div class="sensor-item">
                        <div class="value" id="humiVal">--</div>
                        <div class="unit">%</div>
                        <div class="label">湿度</div>
                        <div class="sub" id="humiScore" style="color:#4caf50">--</div>
                    </div>
                    <div class="sensor-item">
                        <div class="value" id="lightVal">--</div>
                        <div class="unit">lux</div>
                        <div class="label">光照</div>
                        <div class="sub" id="lightScore" style="color:#4caf50">--</div>
                    </div>
                    <div class="sensor-item">
                        <div class="value" id="distVal">--</div>
                        <div class="unit">mm</div>
                        <div class="label">超声波</div>
                    </div>
                </div>
            </div>

            <!-- 评分详情 -->
            <div class="card">
                <h3>评分明细</h3>
                <div class="score-bar">
                    <div class="label-row"><span>温度</span><span id="tsText">--</span></div>
                    <div class="bar-track"><div class="bar-fill green" id="tsBar" style="width:0"></div></div>
                </div>
                <div class="score-bar">
                    <div class="label-row"><span>湿度</span><span id="hsText">--</span></div>
                    <div class="bar-track"><div class="bar-fill green" id="hsBar" style="width:0"></div></div>
                </div>
                <div class="score-bar">
                    <div class="label-row"><span>光照</span><span id="lsText">--</span></div>
                    <div class="bar-track"><div class="bar-fill green" id="lsBar" style="width:0"></div></div>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:12px;color:#8899aa;margin-top:12px">
                    <span>蒸发指数: <b id="evapVal">--</b></span>
                    <span>人体: <span id="humanVal">--</span></span>
                    <span>冷却: <span id="coolVal">--</span></span>
                </div>
            </div>
        </div>

        <!-- 执行器控制 -->
        <div class="dashboard" style="grid-template-columns: 1fr 1fr 1fr;">
            <!-- 窗帘控制 -->
            <div class="card">
                <h3>窗帘控制 (E3)</h3>
                <div class="actuator-item">
                    <span class="name">窗帘</span>
                    <span class="mode-tag" id="curtainMode" class="auto">AUTO</span>
                </div>
                <div class="actuator-slider">
                    <input type="range" id="curtainSlider" min="0" max="100" value="0" oninput="onCurtainSlider()">
                    <div style="font-size:12px;color:#8899aa">位置: <span id="curtainPos">0</span>%</div>
                </div>
                <div class="btn-group" style="margin-top:10px">
                    <button class="btn-auto" onclick="sendCmd('CURTAIN:AUTO')">自动</button>
                    <button class="btn-open" onclick="sendCmd('CURTAIN:OPEN')">打开</button>
                    <button class="btn-close" onclick="sendCmd('CURTAIN:CLOSE')">关闭</button>
                </div>
            </div>

            <!-- 风扇控制 -->
            <div class="card">
                <h3>风扇控制 (E2)</h3>
                <div class="actuator-item">
                    <span class="name">通风风扇</span>
                    <span class="mode-tag" id="fanMode" class="auto">AUTO</span>
                </div>
                <div class="actuator-slider">
                    <input type="range" id="fanSlider" min="0" max="100" value="0" oninput="onFanSlider()">
                    <div style="font-size:12px;color:#8899aa">转速: <span id="fanSpeed">0</span>%</div>
                </div>
                <div class="btn-group" style="margin-top:10px">
                    <button class="btn-auto" onclick="sendCmd('FAN:AUTO')">自动</button>
                    <button class="btn-open" onclick="sendCmd('FAN:ON')">开启</button>
                    <button class="btn-close" onclick="sendCmd('FAN:OFF')">关闭</button>
                </div>
            </div>

            <!-- 植物切换 + 模式 -->
            <div class="card">
                <h3>植物档案切换</h3>
                <div class="plant-buttons">
                    <button id="btnPlant1" onclick="sendCmd('PLANT:1')">绿萝</button>
                    <button id="btnPlant2" onclick="sendCmd('PLANT:2')">多肉</button>
                    <button id="btnPlant3" onclick="sendCmd('PLANT:3')">发财树</button>
                </div>
                <button class="btn-plant" style="width:100%;margin-top:15px;padding:10px" onclick="sendCmd('PLANT:NEXT')">下一个植物</button>

                <h3 style="margin-top:20px">系统模式</h3>
                <div class="btn-group" style="justify-content:center">
                    <button class="btn-auto" onclick="sendCmd('AUTO:ON')">全自动</button>
                    <button class="btn-close" onclick="sendCmd('AUTO:OFF')">手动模式</button>
                </div>
            </div>
        </div>

        <!-- 命令测试 -->
        <div class="card cmd-section">
            <h3>命令测试 (串口指令)</h3>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
                <button onclick="sendCmd('STATUS?')">全部状态</button>
                <button onclick="sendCmd('TEMP?')">温度</button>
                <button onclick="sendCmd('HUMI?')">湿度</button>
                <button onclick="sendCmd('LIGHT?')">光照</button>
                <button onclick="sendCmd('SCORE?')">评分</button>
                <button onclick="sendCmd('DISTANCE?')">超声波</button>
                <button onclick="sendCmd('HUMAN?')">人体红外</button>
                <button onclick="sendCmd('HELP')">帮助</button>
            </div>
            <textarea id="cmdInput" placeholder="输入自定义命令..."></textarea>
            <button onclick="sendCmd()">发送</button>
            <div class="cmd-output" id="cmdOutput"></div>
        </div>
    </div>

    <script>
        let pollingTimer = null;

        // === 连接管理 ===
        async function toggleConnect() {
            const btn = document.getElementById('btnConnect');
            if (btn.textContent === '连接') {
                await fetch('/api/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: 'connect',
                        port: document.getElementById('portSelect').value
                    })
                });
            } else {
                await fetch('/api/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'disconnect'})
                });
            }
            updateConnectionUI();
        }

        async function refreshPorts() {
            const resp = await fetch('/api/ports');
            const data = await resp.json();
            const sel = document.getElementById('portSelect');
            sel.innerHTML = '<option value="">自动检测</option>';
            data.ports.forEach(p => {
                sel.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }

        function updateConnectionUI() {
            fetch('/api/status').then(r => r.json()).then(s => {
                const dot = document.getElementById('statusDot');
                dot.className = 'status-dot ' + (s.connected ? 'on' : 'off');
                document.getElementById('connectLabel').textContent = s.connected ? s.port : '未连接';
                document.getElementById('btnConnect').textContent = s.connected ? '断开' : '连接';
                document.getElementById('btnConnect').className = s.connected ? 'danger' : '';
            });
        }

        // === 数据更新 ===
        async function updateDashboard() {
            const resp = await fetch('/api/status');
            const s = await resp.json();
            if (!s.connected) { updateConnectionUI(); return; }

            // 植物
            document.getElementById('plantName').textContent = s.plant_name;

            // 传感器
            document.getElementById('tempVal').textContent = s.temperature.toFixed(1);
            document.getElementById('humiVal').textContent = s.humidity.toFixed(1);
            document.getElementById('lightVal').textContent = s.light.toFixed(0);
            document.getElementById('distVal').textContent = s.distance;
            document.getElementById('evapVal').textContent = s.evaporation.toFixed(1);
            document.getElementById('humanVal').innerHTML = s.human ? '<span style="color:#4caf50">有人</span>' : '<span style="color:#555">无人</span>';
            document.getElementById('coolVal').textContent = s.cooldown ? '是' : '否';

            // 评分
            document.getElementById('totalScore').textContent = s.total_score;
            scoreColor(document.getElementById('scoreCircle'), s.total_score);
            updateScoreBar('ts', s.temp_score);
            updateScoreBar('hs', s.humi_score);
            updateScoreBar('ls', s.light_score);

            // 执行器
            document.getElementById('curtainPos').textContent = s.curtain_pos;
            document.getElementById('curtainSlider').value = s.curtain_pos;
            const cm = document.getElementById('curtainMode');
            cm.textContent = s.curtain_auto ? 'AUTO' : 'MANUAL';
            cm.className = 'mode-tag ' + (s.curtain_auto ? 'auto' : 'manual');

            document.getElementById('fanSpeed').textContent = s.fan_speed;
            document.getElementById('fanSlider').value = s.fan_speed;
            const fm = document.getElementById('fanMode');
            fm.textContent = s.fan_auto ? 'AUTO' : 'MANUAL';
            fm.className = 'mode-tag ' + (s.fan_auto ? 'auto' : 'manual');

            // 植物按钮active
            ['btnPlant1','btnPlant2','btnPlant3'].forEach((id,i) => {
                document.getElementById(id).className = (s.plant_id === i+1) ? 'active' : '';
            });

            updateConnectionUI();
        }

        function updateScoreBar(prefix, score) {
            document.getElementById(prefix + 'Text').textContent = score + '/100';
            document.getElementById(prefix + 'Bar').style.width = score + '%';
            const bar = document.getElementById(prefix + 'Bar');
            bar.className = 'bar-fill ' + (score >= 70 ? 'green' : (score >= 50 ? 'yellow' : 'red'));
        }

        function scoreColor(el, score) {
            if (score >= 70) el.style.borderColor = '#4caf50';
            else if (score >= 50) el.style.borderColor = '#ff9800';
            else el.style.borderColor = '#f44336';
        }

        // === 命令发送 ===
        async function sendCmd(cmd) {
            if (!cmd) cmd = document.getElementById('cmdInput').value.trim();
            if (!cmd) return;
            const resp = await fetch('/api/command', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({command: cmd})
            });
            const data = await resp.json();
            const out = document.getElementById('cmdOutput');
            out.textContent = '> ' + cmd + '\n' + data.response + '\n' + out.textContent;
        }

        // === 滑块事件 ===
        let sliderTimeout = null;
        function onCurtainSlider() {
            clearTimeout(sliderTimeout);
            const v = document.getElementById('curtainSlider').value;
            document.getElementById('curtainPos').textContent = v;
            sliderTimeout = setTimeout(() => sendCmd('CURTAIN:POS,' + v), 300);
        }
        function onFanSlider() {
            clearTimeout(sliderTimeout);
            const v = document.getElementById('fanSlider').value;
            document.getElementById('fanSpeed').textContent = v;
            sliderTimeout = setTimeout(() => sendCmd('FAN:SPEED,' + v), 300);
        }

        // === 初始化 ===
        setInterval(updateDashboard, 3000);
        refreshPorts();
        updateConnectionUI();
        // 自动连接
        setTimeout(async () => {
            await fetch('/api/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'connect', port: ''})
            });
            updateConnectionUI();
        }, 1000);
    </script>
</body>
</html>
